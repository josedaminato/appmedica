# Nginx dentro del contenedor frontend — solo archivos estáticos (SPA)
# El proxy /api lo hace Nginx del host (nginx/app.daminatoweb.com.conf)

server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
