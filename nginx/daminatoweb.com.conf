# AppMedica — Nginx del HOST (Ubuntu)
# Dominio raíz: landing + app React + API en el mismo sitio.
#
# Instalar (una vez en el VPS):
#   sudo cp nginx/daminatoweb.com.conf /etc/nginx/sites-available/daminatoweb.com.conf
#   sudo ln -sf /etc/nginx/sites-available/daminatoweb.com.conf /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#
# SSL (después del primer deploy HTTP):
#   sudo certbot --nginx -d daminatoweb.com -d www.daminatoweb.com
#
# DNS: registro A @ → IP del VPS. Borrar AAAA si apunta a Hostinger (provoca SSL roto).
# VPS compartido (MarioRCM, etc.): AppMedica frontend en :3002 — ver nginx/mariorcm.example.conf

upstream appmedica_frontend {
    server 127.0.0.1:3002;
}

upstream appmedica_backend {
    server 127.0.0.1:8000;
}

server {
    listen 80;
    listen [::]:80;
    server_name daminatoweb.com www.daminatoweb.com;

    client_max_body_size 10M;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss;

    # API FastAPI (/api/v1/...)
    location /api/ {
        proxy_pass http://appmedica_backend/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 60s;
    }

    # SPA React: / landing, /login, /inicio, etc.
    location / {
        proxy_pass http://appmedica_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Certbot agrega listen 443 ssl y redirect HTTP→HTTPS
}
