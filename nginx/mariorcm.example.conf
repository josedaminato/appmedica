# MarioRCM — convive con AppMedica en el mismo VPS
# AppMedica → daminatoweb.com (puerto 3002)
# MarioRCM  → rcm.daminatoweb.com (ajustar puerto abajo)
#
# DNS: registro A  rcm  →  IP del VPS
# SSL: sudo certbot --nginx -d rcm.daminatoweb.com
#
# Instalar:
#   sudo cp nginx/mariorcm.example.conf /etc/nginx/sites-available/mariorcm.conf
#   # Editar upstream al puerto real de MarioRCM (ss -tlnp | grep node)
#   sudo ln -sf /etc/nginx/sites-available/mariorcm.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

upstream mariorcm_app {
    server 127.0.0.1:3000;
}

server {
    listen 80;
    listen [::]:80;
    server_name rcm.daminatoweb.com;

    location / {
        proxy_pass http://mariorcm_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
