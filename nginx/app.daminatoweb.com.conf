# AppMedica — Nginx del HOST (Ubuntu)
# Instalar:
#   sudo cp nginx/app.daminatoweb.com.conf /etc/nginx/sites-available/
#   sudo ln -sf /etc/nginx/sites-available/app.daminatoweb.com.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
# SSL:
#   sudo certbot --nginx -d app.daminatoweb.com

upstream appmedica_frontend {
    server 127.0.0.1:3002;
}

upstream appmedica_backend {
    server 127.0.0.1:8000;
}

server {
    listen 80;
    listen [::]:80;
    server_name app.daminatoweb.com;

    client_max_body_size 10M;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss;

    # API FastAPI (/api/v1/...)
    location /api/ {
        proxy_pass http://appmedica_backend/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 60s;
    }

    # SPA React (contenedor frontend en :3002)
    location / {
        proxy_pass http://appmedica_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Certbot agrega aquí el bloque listen 443 ssl y redirección HTTP→HTTPS
}
