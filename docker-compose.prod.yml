# AppMedica — producción (VPS Ubuntu 24.04)
#
# Nginx del HOST hace proxy (ver nginx/daminatoweb.com.conf):
#   /     → frontend:3002 (React + landing)
#   /api/ → backend:8000
#
# Uso:
#   cp backend/.env.prod.example backend/.env.prod
#   nano backend/.env.prod
#   docker compose -f docker-compose.prod.yml --env-file backend/.env.prod up -d --build

name: appmedica

services:
  db:
    image: postgres:16-alpine
    container_name: appmedica-db
    restart: always
    env_file:
      - backend/.env.prod
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # CAMBIAR EN PROD: en docker-compose.yml dev se expone 5432; aquí no.
    networks:
      - appmedica_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 768M
    command: >
      postgres
      -c shared_buffers=128MB
      -c max_connections=50

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: appmedica-backend
    restart: always
    env_file:
      - backend/.env.prod
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      APP_ENV: production
      UVICORN_RELOAD: "0"
      REMINDER_BACKGROUND_LOOP: "false"
    depends_on:
      db:
        condition: service_healthy
    ports:
      # Solo localhost: Nginx del host hace proxy a :8000
      - "127.0.0.1:8000:8000"
    networks:
      - appmedica_internal
    deploy:
      resources:
        limits:
          memory: 768M
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health', timeout=3)\""]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 40s
    # Migraciones: scripts/deploy.sh (alembic upgrade head)
    command: >
      sh -c "exec uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers $${UVICORN_WORKERS:-1}"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_URL: ${VITE_API_URL:-/api/v1}
    container_name: appmedica-frontend
    restart: always
    depends_on:
      backend:
        condition: service_healthy
    ports:
      # 3002 en VPS compartido (3000/3001 suelen ser MarioRCM, ReclamoExpress, etc.)
      - "127.0.0.1:3002:80"
    networks:
      - appmedica_internal
    deploy:
      resources:
        limits:
          memory: 128M

networks:
  appmedica_internal:
    driver: bridge

volumes:
  postgres_data:
    name: appmedica_postgres_data
