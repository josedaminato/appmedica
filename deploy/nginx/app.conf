# AppMedica — reverse proxy + SPA (producción Hostinger VPS)
# SSL: montá certificados en /etc/nginx/certs o usá Certbot en el host.

upstream appmedica_api {
    server backend:8000;
}

server {
    listen 80;
    server_name daminatoweb.com www.daminatoweb.com;

    client_max_body_size 10M;

    # Frontend estático (React build)
    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass http://appmedica_api/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /docs {
        proxy_pass http://appmedica_api/docs;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /redoc {
        proxy_pass http://appmedica_api/redoc;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /openapi.json {
        proxy_pass http://appmedica_api/openapi.json;
        proxy_set_header Host $host;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

