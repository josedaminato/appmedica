# Snippet nginx del HOST — solo AppMedica (app.daminatoweb.com)
# Otros dominios/servicios en el mismo VPS son independientes; no mezclar configs.
# Ubicación típica: /etc/nginx/sites-available/appmedica
# ln -s ... sites-enabled/ && nginx -t && systemctl reload nginx
#
# Requisito: AppMedica en Docker con HTTP_PORT=8082
# DNS: registro A  app  →  45.152.46.212

server {
    listen 80;
    server_name app.daminatoweb.com;

    client_max_body_size 10M;

    location / {
        proxy_pass http://127.0.0.1:8082;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Con SSL (Certbot: certbot --nginx -d app.daminatoweb.com):
# Certbot suele agregar el bloque listen 443 automáticamente.
